<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 – Server Error | AKILIMO Nigeria Association</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --light: #4CAF50; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #f8faf8; overflow-x: hidden;
        }
        .bg-layer {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #7B1FA2 0%, #4A148C 50%, #1B5E20 100%);
            z-index: 0;
        }
        .bg-layer::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 30% 60%, rgba(255,255,255,0.07) 0%, transparent 55%);
        }
        .circle {
            position: fixed; border-radius: 50%;
            background: rgba(255,255,255,0.04);
            animation: float 9s ease-in-out infinite;
        }
        .circle-1 { width: 450px; height: 450px; top: -120px; right: -120px; }
        .circle-2 { width: 280px; height: 280px; bottom: -60px; left: -60px; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-18px); }
        }
        /* Animated gears */
        .gear-wrap {
            position: relative; width: 100px; height: 100px; margin: 0 auto 1.5rem;
        }
        .gear {
            position: absolute;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.15);
        }
        .error-card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            max-width: 620px; width: 90%; text-align: center;
        }
        .error-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #7B1FA2, #4A148C);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem; color: #fff;
            box-shadow: 0 8px 24px rgba(123,31,162,0.4);
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(123,31,162,0.4); }
            50%       { box-shadow: 0 8px 36px rgba(123,31,162,0.7); }
        }
        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 8rem; font-weight: 700; line-height: 1;
            background: linear-gradient(135deg, #7B1FA2, #4A148C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .divider {
            height: 3px; width: 60px;
            background: linear-gradient(90deg, #7B1FA2, #4A148C);
            border-radius: 2px; margin: 1.5rem auto;
        }
        .btn-home {
            background: linear-gradient(135deg, #1B5E20, #4CAF50);
            color: #fff; border: none;
            padding: 0.85rem 2.5rem; border-radius: 50px;
            font-weight: 600; font-size: 1rem;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(46,125,50,0.35);
        }
        .btn-home:hover { color:#fff; transform:translateY(-2px); box-shadow:0 10px 28px rgba(46,125,50,0.45); }
        .btn-retry {
            color: #7B1FA2; border: 2px solid #7B1FA2;
            padding: 0.8rem 2rem; border-radius: 50px;
            font-weight: 600; font-size: 1rem;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem;
            transition: all 0.3s ease;
        }
        .btn-retry:hover { background:#7B1FA2; color:#fff; transform:translateY(-2px); }
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: #FFF3E0; color: #E65100;
            border-radius: 20px; padding: 0.3rem 1rem;
            font-size: 0.8rem; font-weight: 600; margin-bottom: 1rem;
        }
        .status-dot { width:8px;height:8px;border-radius:50%;background:#E65100;animation:blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <div class="error-code">500</div>
        <div class="divider"></div>

        <div class="status-badge">
            <span class="status-dot"></span> Server Error Detected
        </div>

        <h2 style="color:#4A148C;font-family:'Poppins',sans-serif;font-weight:700;margin-bottom:0.75rem;">
            Something Went Wrong
        </h2>
        <p class="text-muted mb-4" style="font-size:1.05rem;line-height:1.7;">
            Our server encountered an unexpected error. Our team has been notified and we're working to fix it as quickly as possible.
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">
            <a href="/" class="btn-home"><i class="bi bi-house-fill"></i> Back to Home</a>
            <a href="javascript:location.reload()" class="btn-retry"><i class="bi bi-arrow-clockwise"></i> Try Again</a>
        </div>

        <p class="mb-0" style="color:#aaa;font-size:0.8rem;">
            AKILIMO Nigeria Association &mdash; Error 500
        </p>
    </div>
</body>
</html>
