<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 – Access Denied | AKILIMO Nigeria Association</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            overflow-x:hidden;
        }
        .bg-layer {
            position:fixed;inset:0;
            background:linear-gradient(135deg,#B71C1C 0%,#C62828 50%,#1B5E20 100%);
            z-index:0;
        }
        .circle {
            position:fixed;border-radius:50%;
            background:rgba(255,255,255,0.05);
            animation:float 8s ease-in-out infinite;
        }
        .circle-1{width:380px;height:380px;top:-100px;left:-100px;}
        .circle-2{width:260px;height:260px;bottom:-60px;right:-60px;animation-delay:4s;}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}

        .error-card {
            position:relative;z-index:1;
            background:rgba(255,255,255,0.97);
            border-radius:24px;
            padding:3rem 3.5rem;
            box-shadow:0 30px 80px rgba(0,0,0,0.3);
            max-width:600px;width:90%;text-align:center;
        }
        .error-icon {
            width:90px;height:90px;
            background:linear-gradient(135deg,#B71C1C,#C62828);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 1.5rem;
            font-size:2.2rem;color:#fff;
            box-shadow:0 8px 24px rgba(183,28,28,0.45);
            animation:shake 3s ease-in-out infinite;
        }
        @keyframes shake{
            0%,100%{transform:rotate(0deg);}
            10%,30%,50%{transform:rotate(-6deg);}
            20%,40%{transform:rotate(6deg);}
            60%{transform:rotate(0deg);}
        }
        .error-code {
            font-family:'Poppins',sans-serif;
            font-size:8rem;font-weight:700;line-height:1;
            background:linear-gradient(135deg,#B71C1C,#C62828);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .divider {height:3px;width:60px;background:linear-gradient(90deg,#B71C1C,#C62828);border-radius:2px;margin:1.5rem auto;}
        .btn-home {
            background:linear-gradient(135deg,#1B5E20,#4CAF50);
            color:#fff;border:none;padding:0.85rem 2.5rem;border-radius:50px;
            font-weight:600;font-size:1rem;text-decoration:none;
            display:inline-flex;align-items:center;gap:0.5rem;
            transition:all 0.3s;box-shadow:0 6px 20px rgba(46,125,50,0.35);
        }
        .btn-home:hover{color:#fff;transform:translateY(-2px);box-shadow:0 10px 28px rgba(46,125,50,0.45);}
        .btn-login {
            color:#B71C1C;border:2px solid #B71C1C;
            padding:0.8rem 2rem;border-radius:50px;
            font-weight:600;font-size:1rem;text-decoration:none;
            display:inline-flex;align-items:center;gap:0.5rem;
            transition:all 0.3s;
        }
        .btn-login:hover{background:#B71C1C;color:#fff;transform:translateY(-2px);}
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="error-card">
        <div class="error-icon"><i class="bi bi-shield-lock-fill"></i></div>
        <div class="error-code">403</div>
        <div class="divider"></div>
        <h2 style="color:#B71C1C;font-family:'Poppins',sans-serif;font-weight:700;margin-bottom:0.75rem;">
            Access Denied
        </h2>
        <p class="text-muted mb-4" style="font-size:1.05rem;line-height:1.7;">
            You don't have permission to view this page. If you believe this is a mistake, please log in or contact the administrator.
        </p>
        <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">
            <a href="/" class="btn-home"><i class="bi bi-house-fill"></i> Back to Home</a>
            <a href="/dashboard/login/" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Log In</a>
        </div>
        <p class="mb-0" style="color:#aaa;font-size:0.8rem;">AKILIMO Nigeria Association &mdash; Error 403</p>
    </div>
</body>
</html>
