<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | AKILIMO Nigeria Association</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2E7D32;
            --light:   #4CAF50;
            --dark:    #1B5E20;
            --surface: #E8F5E8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f8faf8;
            overflow-x: hidden;
        }
        /* Animated background */
        .bg-layer {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #4CAF50 100%);
            z-index: 0;
        }
        .bg-layer::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
        }
        /* Floating circles */
        .circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            animation: float 8s ease-in-out infinite;
        }
        .circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
        .circle-2 { width: 300px; height: 300px; bottom: -80px; right: -80px; animation-delay: 3s; }
        .circle-3 { width: 200px; height: 200px; top: 40%; right: 10%; animation-delay: 1.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-20px) scale(1.05); }
        }

        .error-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #1B5E20, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .error-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #1B5E20, #4CAF50);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem; color: #fff;
            box-shadow: 0 8px 24px rgba(46,125,50,0.4);
        }
        .btn-home {
            background: linear-gradient(135deg, #1B5E20, #4CAF50);
            color: #fff;
            border: none;
            padding: 0.85rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(46,125,50,0.35);
        }
        .btn-home:hover {
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(46,125,50,0.45);
        }
        .btn-back {
            color: #2E7D32;
            border: 2px solid #2E7D32;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #2E7D32;
            color: #fff;
            transform: translateY(-2px);
        }
        .divider {
            height: 3px;
            width: 60px;
            background: linear-gradient(90deg, #1B5E20, #4CAF50);
            border-radius: 2px;
            margin: 1.5rem auto;
        }
        .suggestions a {
            display: inline-flex; align-items: center; gap: 0.4rem;
            color: #2E7D32; text-decoration: none; font-size: 0.9rem;
            font-weight: 500; padding: 0.4rem 1rem;
            border-radius: 20px; background: #E8F5E8;
            transition: all 0.2s;
        }
        .suggestions a:hover { background: #2E7D32; color: #fff; }
        footer-bar { color: rgba(255,255,255,0.6); font-size: 0.8rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="bg-layer"></div>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-map"></i>
        </div>
        <div class="error-code">404</div>
        <div class="divider"></div>
        <h2 style="color:#1B5E20;font-family:'Poppins',sans-serif;font-weight:700;margin-bottom:0.75rem;">
            Page Not Found
        </h2>
        <p class="text-muted mb-4" style="font-size:1.05rem;line-height:1.7;">
            We couldn't find the page you were looking for. It may have been moved, deleted, or the link might be incorrect.
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">
            <a href="/" class="btn-home"><i class="bi bi-house-fill"></i> Back to Home</a>
            <a href="javascript:history.back()" class="btn-back"><i class="bi bi-arrow-left"></i> Go Back</a>
        </div>

        <div class="suggestions d-flex flex-wrap justify-content-center gap-2">
            <a href="/about/"><i class="bi bi-info-circle"></i> About</a>
            <a href="/partners/"><i class="bi bi-handshake"></i> Partners</a>
            <a href="/programs/"><i class="bi bi-clipboard-data"></i> Programs</a>
            <a href="/contact/"><i class="bi bi-envelope"></i> Contact</a>
        </div>

        <p class="mt-4 mb-0" style="color:#aaa;font-size:0.8rem;">
            AKILIMO Nigeria Association &mdash; Error 404
        </p>
    </div>
</body>
</html>
